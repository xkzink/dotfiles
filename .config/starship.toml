# format = """
# [вХ≠вФАuserвФАвФАвФАвЭѓ](bold blue) $username$hostname
# [вФ£вФАprojectвЭѓ](bold red) $directory$rust$git_branch$git_status$package$golang$terraform$docker_context$python$docker_context$nodejs$fill$cmd_duration
# [вХ∞вФАcmdвФАвФАвФАвФАвЭѓ](bold green) 
# """

add_newline = true

[line_break]
disabled = false

[fill]
symbol = " "

[username]
style_user = "blue bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "on [$hostname](bold purple) "
trim_at = ""
disabled = false

# Replace the "вЭѓ" symbol in the prompt with "вЮЬ"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[вЮЬ](bold green)"     # The "success_symbol" segment is being set to "вЮЬ" with the color "bold green"
error_symbol = "[вЬЧ](bold red)"
vimcmd_symbol = "[<](bold green)"

# пФґ пФі
# configure directory
[directory]
read_only = " оВҐ"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"
format = 'took [$duration]($style)'

[aws]
style = "bold yellow"
symbol = "оМљ  "
[aws.region_aliases]
ap-southeast-2 = "au"
us-east-1 = "va"

[conda]
symbol = "пДМ "

[dart]
symbol = "оЮШ "

[docker_context]
symbol = "пМИ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "оЙµ "

[elm]
symbol = "оШђ "

[git_branch]
symbol = "пРШ "

[golang]
symbol = "оШІ "

[hg_branch]
symbol = "пРШ "

[java]
symbol = "оЙЦ "

[julia]
symbol = "оШ§ "

[memory_usage]
symbol = "у∞НЫ "

[nim]
symbol = "оЩЈ "

[nix_shell]
symbol = "пЛЬ "

[package]
symbol = "у∞ПЧ "

[perl]
symbol = "оЭ© "

[php]
symbol = "оШИ "

[python]
symbol = "оШЖ "
pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "pyenv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "оИЊ "

[rust]
symbol = "оЮ® "

[scala]
symbol = "оЬЈ "

[shlvl]
symbol = "пД† "

[swift]
symbol = "пѓ£ "

[nodejs]
format = "via [оЬШ Node.js $version](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]
